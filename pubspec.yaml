name: dday_app
description: "TickDay - Countdown & Reminder"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  intl: any

  flutter_local_notifications: ^17.0.0
  flutter_timezone: ^5.0.2
  timezone: ^0.9.2
  shared_preferences: ^2.5.5
  share_plus: ^10.1.4
  app_settings: ^5.1.1
  home_widget: ^0.8.0
  url_launcher: ^6.3.1
  google_mobile_ads: ^5.3.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
